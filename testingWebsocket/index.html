<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | WebSocket Test Desk</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- SockJS and STOMP.js CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <style>
        /* Modern Premium Dark CSS System */
        :root {
            --bg-color: #07090e;
            --panel-bg: rgba(15, 22, 36, 0.7);
            --panel-border: rgba(255, 255, 255, 0.06);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --cyan: #06b6d4;
            --cyan-glow: rgba(6, 182, 212, 0.3);
            --green: #10b981;
            --red: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'Fira Code', monospace;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%);
        }

        /* Top Header Navigation */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--panel-border);
            backdrop-filter: blur(12px);
            background: rgba(7, 9, 14, 0.8);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--red);
            box-shadow: 0 0 8px var(--red);
            transition: var(--transition-smooth);
        }

        .status-dot.connected {
            background-color: var(--green);
            box-shadow: 0 0 10px var(--green);
            animation: pulse-green 2s infinite;
        }

        .status-dot.connecting {
            background-color: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            animation: pulse-cyan 1s infinite;
        }

        /* Main Workspace Container */
        .workspace {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 2rem;
            padding: 2rem 2.5rem;
            flex-grow: 1;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Sidebar Control Center */
        .control-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.75rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-group input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition-smooth);
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        button {
            font-family: var(--font-main);
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 14px 0 var(--primary-glow);
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 var(--primary-glow);
        }

        .btn-connect:active {
            transform: translateY(0);
        }

        .btn-disconnect {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
        }

        .btn-disconnect:hover {
            background: var(--red);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.35);
        }

        /* Editor & Output Container */
        .main-editor-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Editor Area */
        .editor-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .editor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .active-room-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .textarea-container {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            background: rgba(0, 0, 0, 0.45);
        }

        textarea {
            width: 100%;
            height: 250px;
            background: transparent;
            border: none;
            color: var(--cyan);
            font-family: var(--font-mono);
            font-size: 0.95rem;
            padding: 1.25rem;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }

        .btn-send {
            background: linear-gradient(135deg, var(--cyan), #0891b2);
            color: white;
            box-shadow: 0 4px 14px 0 var(--cyan-glow);
            align-self: flex-end;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 var(--cyan-glow);
        }

        .btn-send:disabled {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Console Output Logs */
        .console-panel {
            background: #040508;
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: 300px;
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.5rem;
        }

        .btn-clear {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--panel-border);
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        .btn-clear:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .console-logs {
            flex-grow: 1;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            line-height: 1.5;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.01);
        }

        .log-time {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .log-type-CHAT {
            color: var(--text-main);
        }

        .log-type-JOIN {
            color: var(--green);
            background: rgba(16, 185, 129, 0.08);
            border-left: 2px solid var(--green);
        }

        .log-type-LEFT {
            color: var(--red);
            background: rgba(239, 68, 68, 0.08);
            border-left: 2px solid var(--red);
        }

        .log-type-SYSTEM {
            color: var(--cyan);
            background: rgba(6, 182, 212, 0.08);
        }

        .log-user {
            font-weight: 600;
            color: var(--primary);
        }

        .log-text {
            word-break: break-all;
        }

        /* Animations */
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(6, 182, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(6, 182, 212, 0); }
        }
    </style>
</head>
<body>

    <!-- Header Panel -->
    <header>
        <div class="logo">Antigravity WebSocket Desk</div>
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </header>

    <!-- Main Grid Workspace -->
    <main class="workspace">
        
        <!-- Sidebar Control Panel -->
        <section class="control-panel">
            <h2 class="panel-title">Session Configuration</h2>
            
            <div class="input-group">
                <label for="wsUrl">WebSocket Endpoint</label>
                <input type="text" id="wsUrl" value="http://localhost:8080/ws" placeholder="http://localhost:8080/ws">
            </div>

            <div class="input-group">
                <label for="username">User Name / Creator</label>
                <input type="text" id="username" value="" placeholder="Enter name...">
            </div>

            <div class="input-group">
                <label for="roomId">Room ID / Target</label>
                <input type="text" id="roomId" value="1001" placeholder="e.g. 1001">
            </div>

            <button class="btn-connect" id="btnConnect" onclick="connect()">Connect STOMP</button>
            <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()" style="display: none;">Disconnect</button>
        </section>

        <!-- Main Workspace -->
        <section class="main-editor-container">
            
            <!-- Editor Textarea Area -->
            <div class="editor-panel">
                <div class="editor-header">
                    <h2 class="active-room-title" id="roomTitle">Room Workspace: None</h2>
                </div>
                <div class="textarea-container">
                    <textarea id="editorContent" placeholder="// Write text or code here to broadcast..." disabled></textarea>
                </div>
                <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>Broadcast Message</button>
            </div>

            <!-- Console Log Feed -->
            <div class="console-panel">
                <div class="console-header">
                    <span>LIVE EVENT LOGS</span>
                    <button class="btn-clear" onclick="clearLogs()">Clear Console</button>
                </div>
                <div class="console-logs" id="consoleLogs">
                    <div class="log-entry log-type-SYSTEM">
                        <span class="log-time">[System]</span>
                        <span class="log-text">Test desk initialized. Set your settings and click 'Connect'.</span>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <!-- Client-side WebSocket Integration Logic -->
    <script>
        let stompClient = null;
        let isConnected = false;

        // Auto-generate random username
        document.getElementById('username').value = 'User_' + Math.floor(1000 + Math.random() * 9000);

        function updateUIState(state) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const btnConnect = document.getElementById('btnConnect');
            const btnDisconnect = document.getElementById('btnDisconnect');
            const editorContent = document.getElementById('editorContent');
            const btnSend = document.getElementById('btnSend');
            const roomTitle = document.getElementById('roomTitle');
            const targetRoomId = document.getElementById('roomId').value;

            statusDot.className = 'status-dot';
            if (state === 'CONNECTED') {
                statusDot.classList.add('connected');
                statusText.innerText = 'Connected';
                btnConnect.style.display = 'none';
                btnDisconnect.style.display = 'inline-flex';
                editorContent.disabled = false;
                btnSend.disabled = false;
                roomTitle.innerText = `Room Workspace: ${targetRoomId}`;
                isConnected = true;
            } else if (state === 'CONNECTING') {
                statusDot.classList.add('connecting');
                statusText.innerText = 'Connecting...';
                btnConnect.disabled = true;
                isConnected = false;
            } else { // DISCONNECTED
                statusText.innerText = 'Disconnected';
                btnConnect.style.display = 'inline-flex';
                btnConnect.disabled = false;
                btnDisconnect.style.display = 'none';
                editorContent.disabled = true;
                btnSend.disabled = true;
                roomTitle.innerText = `Room Workspace: None`;
                isConnected = false;
            }
        }

        function logToConsole(type, sender, text) {
            const consoleLogs = document.getElementById('consoleLogs');
            const logEntry = document.createElement('div');
            logEntry.classList.add('log-entry', `log-type-${type}`);

            const timestamp = new Date().toLocaleTimeString();
            
            let html = `<span class="log-time">[${timestamp}]</span>`;
            if (sender) {
                html += `<span class="log-user">${sender}:</span>`;
            }
            html += `<span class="log-text">${text}</span>`;
            
            logEntry.innerHTML = html;
            consoleLogs.appendChild(logEntry);
            consoleLogs.scrollTop = consoleLogs.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('consoleLogs').innerHTML = '';
        }

        function connect() {
            const wsUrl = document.getElementById('wsUrl').value.trim();
            const username = document.getElementById('username').value.trim();
            const roomId = document.getElementById('roomId').value.trim();

            if (!username || !roomId || !wsUrl) {
                alert('Please fill in all configuration details.');
                return;
            }

            updateUIState('CONNECTING');
            logToConsole('SYSTEM', null, `Initiating WebSocket connection to ${wsUrl}...`);

            const socket = new SockJS(wsUrl);
            stompClient = Stomp.over(socket);

            // Disable excessive debug logging in browser console for premium feel
            stompClient.debug = function(str) {
                console.log("[STOMP Debug] " + str);
            };

            stompClient.connect({}, function (frame) {
                updateUIState('CONNECTED');
                logToConsole('SYSTEM', null, 'STOMP Handshake Successful! Connected.');
                
                const destination = `/topic/room/${roomId}`;
                logToConsole('SYSTEM', null, `Subscribing to topic: ${destination}`);

                stompClient.subscribe(destination, function (messageOutput) {
                    try {
                        const message = JSON.parse(messageOutput.body);
                        handleIncomingMessage(message);
                    } catch (e) {
                        logToConsole('SYSTEM', null, `Received unparseable message body: ${messageOutput.body}`);
                    }
                });

                // Send a JOIN message automatically to inform others
                const joinMsg = {
                    roomId: roomId,
                    creator: username,
                    content: `${username} joined the workspace session.`,
                    localDateTime: new Date().toISOString(),
                    messageType: 'JOIN'
                };
                stompClient.send("/app/chat.send", {}, JSON.stringify(joinMsg));

            }, function (error) {
                updateUIState('DISCONNECTED');
                logToConsole('LEFT', null, `Connection error or server offline: ${error}`);
            });
        }

        function disconnect() {
            if (stompClient !== null && isConnected) {
                const username = document.getElementById('username').value.trim();
                const roomId = document.getElementById('roomId').value.trim();

                // Send a LEFT message before closing connection
                const leftMsg = {
                    roomId: roomId,
                    creator: username,
                    content: `${username} left the workspace session.`,
                    localDateTime: new Date().toISOString(),
                    messageType: 'LEFT'
                };
                
                try {
                    stompClient.send("/app/chat.send", {}, JSON.stringify(leftMsg));
                } catch(e) {}

                stompClient.disconnect(function() {
                    updateUIState('DISCONNECTED');
                    logToConsole('SYSTEM', null, 'Disconnected from WebSocket server.');
                });
            }
        }

        function sendMessage() {
            if (!isConnected) return;
            
            const username = document.getElementById('username').value.trim();
            const roomId = document.getElementById('roomId').value.trim();
            const content = document.getElementById('editorContent').value;

            const chatMsg = {
                roomId: roomId,
                creator: username,
                content: content,
                localDateTime: new Date().toISOString(),
                messageType: 'CHAT'
            };

            stompClient.send("/app/chat.send", {}, JSON.stringify(chatMsg));
            logToConsole('SYSTEM', null, 'Message broadcast sent.');
        }

        function handleIncomingMessage(msg) {
            // Log to visual feed
            if (msg.messageType === 'JOIN') {
                logToConsole('JOIN', msg.creator, msg.content || 'joined the room.');
            } else if (msg.messageType === 'LEFT') {
                logToConsole('LEFT', msg.creator, msg.content || 'left the room.');
            } else { // CHAT
                logToConsole('CHAT', msg.creator, msg.content);
                // Also update the in-editor textarea content if it comes from another user
                const currentUsername = document.getElementById('username').value.trim();
                if (msg.creator !== currentUsername) {
                    document.getElementById('editorContent').value = msg.content;
                }
            }
        }
    </script>
</body>
</html>
