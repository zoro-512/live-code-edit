spring.application.name=demo
server.port=8081


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:3306/cbc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
execution.container-path=${EXECUTION_CONTAINER_PATH:}
execution.host-path=${EXECUTION_HOST_PATH:}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:myVeryLongSecretKeyForJwtAuthenticationProject2026}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}




