spring.application.name=demo
server.port=8080


spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/cbc
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
execution.container-path=${EXECUTION_CONTAINER_PATH:}
execution.host-path=${EXECUTION_HOST_PATH:}


spring.jpa.hibernate.ddl-auto=update


spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:myVeryLongSecretKeyForJwtAuthenticationProject2026}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173}




